scraper:
  request_delay_seconds: 2
  playwright_timeout_ms: 30000
  max_jobs_per_site: 100
  raw_text_max_chars: 4000

filtering:
  # Tier boundaries (aligned with extractor_scorer.py):
  #   strong_match: score >= strong_match_threshold  (6+)   → emailed immediately
  #   maybe:        score >= maybe_threshold          (4–5)  → DB + Flask UI
  #   not_relevant: score <  maybe_threshold          (≤3)   → DB only / never emailed
  #
  # Email inclusion (read by notifier/gmail.py:_load_thresholds()):
  #   Daily "Strong Matches" section:  score >= strong_match_threshold
  #   Daily "Also Found" section:      score >= email_also_min_score (and < strong_match_threshold)
  #   Never emailed:                   score <  email_also_min_score
  strong_match_threshold: 6
  maybe_threshold: 4
  email_also_min_score: 4

email:
  send_if_no_new_jobs: false
  max_jobs_in_email: 50

pre_filter:
  mode: B   # 'B' = Claude pre-screen | 'C' = embedding similarity (see TODOS for migration criteria)

source_recommender:
  min_jobs: 5   # minimum high-rated jobs (score >= 8) needed to trigger suggestions

dashboard:
  analytics_window_days: 30   # window for the /dashboard 30-day analytics panel
  scheduled_run_time: "07:00" # local time the daily scrape is expected (verdict boundary)
  # pricing: (added in the token-instrumentation PR) per-model token rates for cost

logging:
  level: INFO
  max_bytes: 5242880
  backup_count: 3
