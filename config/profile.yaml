hard_rules:
  disqualify:
  - POSTDOC / Postdoctoral researcher / Postdoctoral associate — requires completed
    PhD. Timo has MSc only. Score 1-2/10 regardless of topic or institution.
  - Roles requiring 5+ years of experience in the relevant field
  - Roles requiring a medical degree (MD/MBBS) or clinical certification
  - Roles with hard language requirements Timo doesn't meet (German-only, Arabic-only,
    etc.)
  penalise_hard:
  - 'Senior / Associate / Lead / Principal / Manager in title — typically 3-7 years
    post-grad experience required. Lower by 2-3 unless explicitly entry-level or labelled
    junior. Exception: ''Research Associate'' in EU/UN contexts means junior researcher.'
  - Primary focus on AI security / cybersecurity / information security — lower by
    2-3
  - Primary focus on climate change / environmental sustainability / green energy
    — lower by 2
  - Communication / PR / marketing / media roles — lower by 3
  - 'Permanent (non-traineeship) position outside Netherlands or Western Europe —
    lower by 2. Exception: internships and traineeships worldwide are fully acceptable.'
